name: "DiligentGraphics: Run Radient Tests"
description: "Run tests from the RadientTest suite"

inputs:
  args:
    description: Optional arguments to pass to the test
    required: false

runs:
  using: "composite" # must be set to "composite"

  steps:
    - name: Run Radient Tests
      working-directory: ${{github.workspace}}
      env:
        INPUT_RUNNER_OS: ${{runner.os}}
        INPUT_ARGS:      ${{inputs.args}}
      shell: bash
      run: |
        # Radient Tests
        chmod +x "${{github.action_path}}/run_radient_tests.sh"
        "${{github.action_path}}/run_radient_tests.sh"
